
<ng-template #title let-chapter>
  @if (chapter.data.isSpecial) {
    {{chapter.data.title || chapter.data.range}}
  } @else {
    <app-entity-title [entity]="chapter.data" [prioritizeTitleName]="false" [libraryType]="libraryType()" />
  }
</ng-template>

<app-entity-card
  [entity]="cardEntity()"
  [config]="config()"
  [index]="index()"
  [maxIndex]="maxIndex()"
  (reload)="reload.emit($event)"
  (dataChanged)="onDataChanged($event)"
  (progressUpdated)="onProgressUpdated($event)"
/>
